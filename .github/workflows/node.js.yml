# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Deploy to cPanel server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} -p ${{ secrets.CPANEL_PORT || 22 }} << 'EOF'
            echo "📂 Navigating to portfolio project directory"
            cd ~/public_html/portfolio

            echo "🔄 Pulling latest code"
            git pull origin main

            echo "📦 Installing dependencies"
            npm install

            echo "🏗️ Building Next.js app"
            npm run build

            echo "🚀 Starting or restarting app with pm2"
            pm2 restart portfolio-app || pm2 start server.js --name "portfolio-app"

            echo "💾 Saving pm2 state"
            pm2 save
          EOF
